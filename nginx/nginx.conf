worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 3000;

        root /usr/share/nginx/html;
        index index.html;

        # Cache static assets (hashed filenames - safe to cache long-term)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm|ogg|mp3|wav|wasm)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }

        # SPA routing fallback - serves index.html for all non-asset routes.
        # Must NOT be cached: index.html references content-hashed chunks that
        # change on every deployment. Stale index.html causes chunk 404s.
        location / {
            try_files $uri /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        error_page 404 /index.html;
    }
}
